project:
  name: "my-research"
  mode: "full-auto"

research:
  topic: "Your research topic here"
  domains:
    - "machine-learning"
  daily_paper_count: 10
  quality_threshold: 4.0

runtime:
  timezone: "Asia/Ho_Chi_Minh"
  max_parallel_tasks: 3
  approval_timeout_hours: 12
  retry_limit: 2

notifications:
  channel: "console"
  target: ""
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

openclaw_bridge:
  use_cron: true
  use_message: true
  use_memory: true
  use_sessions_spawn: true
  use_web_fetch: true
  use_browser: false

# ============================================================================
# LLM Provider: ACP via Claude Code
# No API key required — Claude Code handles its own authentication
# ============================================================================
llm:
  provider: "acp"
  acp:
    agent: "claude"   # Claude Code CLI command (must be installed: npm i -g @anthropic-ai/claude-code)
    cwd: "."          # Working directory for the agent

  # Semantic Scholar API key (optional, for literature search)
  s2_api_key: ""

security:
  hitl_required_stages: [5, 9, 20]
  allow_publish_without_approval: false
  redact_sensitive_logs: true

experiment:
  mode: "sandbox"
  time_budget_sec: 300
  max_iterations: 10
  metric_key: "primary_metric"
  metric_direction: "minimize"
  sandbox:
    python_path: ".venv/bin/python3"
    gpu_required: false
    max_memory_mb: 4096
  docker:
    image: "researchclaw/experiment:latest"
    gpu_enabled: true
    memory_limit_mb: 8192
    network_policy: "none"
    auto_install_deps: true
    shm_size_mb: 2048
    keep_containers: false

export:
  target_conference: "neurips_2025"
  authors: "Anonymous"
  bib_file: "references"

prompts:
  custom_file: ""
